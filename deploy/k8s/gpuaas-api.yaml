apiVersion: v1
kind: Service
metadata:
  name: spur-cloud-api
  namespace: spur-cloud
spec:
  selector:
    app: spur-cloud-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spur-cloud-api
  namespace: spur-cloud
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spur-cloud-api
  template:
    metadata:
      labels:
        app: spur-cloud-api
    spec:
      serviceAccountName: spur-cloud
      containers:
        - name: api
          image: amdaccelcloud/spur-cloud-api:latest
          args:
            - --config=/etc/spur-cloud/spur-cloud.toml
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: RUST_LOG
              value: info
          volumeMounts:
            - name: config
              mountPath: /etc/spur-cloud
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "500m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: spur-cloud-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spur-cloud
  namespace: spur-cloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: spur-cloud
rules:
  # For kube exec (terminal) and pod management
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # For SSH services
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "delete"]
  # For SpurJob CRDs
  - apiGroups: ["spur.amd.com"]
    resources: ["spurjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spur-cloud
subjects:
  - kind: ServiceAccount
    name: spur-cloud
    namespace: spur-cloud
roleRef:
  kind: ClusterRole
  name: spur-cloud
  apiGroup: rbac.authorization.k8s.io
---
# NetworkPolicy: only the ingress-nginx controller and the frontend pod may reach the API.
# External traffic always enters via the ingress controller on the control-plane.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spur-cloud-api
  namespace: spur-cloud
spec:
  podSelector:
    matchLabels:
      app: spur-cloud-api
  policyTypes:
    - Ingress
  ingress:
    # Allow from the ingress-nginx controller pod (for /api routes)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
    # Allow from the frontend pod (in-cluster API calls)
    - from:
        - podSelector:
            matchLabels:
              app: spur-cloud-frontend
